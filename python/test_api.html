<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academix API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #38bdf8;
        }

        h2 {
            color: #38bdf8;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .tab.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: 600;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button:hover {
            background: #7dd3fc;
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .result {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.82rem;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .result.success {
            border-color: #22c55e;
        }

        .result.error {
            border-color: #ef4444;
        }

        .loader {
            display: none;
            margin-left: 10px;
        }

        .loader.show {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .row>div {
            flex: 1;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge.get {
            background: #22c55e;
            color: #000;
        }

        .badge.post {
            background: #3b82f6;
            color: #fff;
        }

        .status {
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .status.ok {
            color: #22c55e;
        }

        .status.fail {
            color: #ef4444;
        }

        hr {
            border: none;
            border-top: 1px solid #334155;
            margin: 15px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧪 Academix API Tester</h1>

        <div class="tabs">
            <div class="tab active" onclick="showTab('rag')">💬 RAG Chat</div>
            <div class="tab" onclick="showTab('upload')">📤 Upload</div>
            <div class="tab" onclick="showTab('summary')">📝 Fiches</div>
            <div class="tab" onclick="showTab('quiz')">🎲 Quiz</div>
            <div class="tab" onclick="showTab('correct')">✅ Correction</div>
            <div class="tab" onclick="showTab('exercises')">🏋️ Exercices</div>
            <div class="tab" onclick="showTab('image')">🖼️ Image IA</div>
        </div>

        <!-- RAG CHAT -->
        <div id="rag" class="section active">
            <div class="card">
                <h2><span class="badge post">POST</span> /api/v1/chat</h2>
                <label>Question</label>
                <textarea id="rag-question" placeholder="Pose ta question sur le cours uploadé..."></textarea>
                <button onclick="testChat()">Envoyer <span id="rag-loader" class="loader">⏳</span></button>
                <div id="rag-result" class="result" style="display:none;"></div>
            </div>
        </div>

        <!-- UPLOAD -->
        <div id="upload" class="section">
            <div class="card">
                <h2><span class="badge post">POST</span> /api/v1/upload</h2>
                <label>Fichier PDF ou TXT</label>
                <input type="file" id="upload-file" accept=".pdf,.txt,.md">
                <button onclick="testUpload()">Uploader <span id="upload-loader" class="loader">⏳</span></button>
                <div id="upload-result" class="result" style="display:none;"></div>
            </div>
        </div>

        <!-- SUMMARY -->
        <div id="summary" class="section">
            <div class="card">
                <h2><span class="badge post">POST</span> /api/v1/summary/generate</h2>
                <label>Fichier PDF ou TXT</label>
                <input type="file" id="summary-file" accept=".pdf,.txt,.md">
                <div class="row">
                    <div>
                        <label>Niveau</label>
                        <select id="summary-level">
                            <option value="short">Court</option>
                            <option value="medium" selected>Moyen</option>
                            <option value="detailed">Détaillé</option>
                        </select>
                    </div>
                    <div>
                        <label>Style</label>
                        <select id="summary-style">
                            <option value="bullets" selected>Bullets</option>
                            <option value="narrative">Narratif</option>
                            <option value="schema">Schéma</option>
                        </select>
                    </div>
                    <div>
                        <label>Matière</label>
                        <input type="text" id="summary-matiere" placeholder="ex: Maths">
                    </div>
                </div>
                <button onclick="testSummary()">Générer la fiche <span id="summary-loader"
                        class="loader">⏳</span></button>
                <div id="summary-result" class="result" style="display:none;"></div>
            </div>
        </div>

        <!-- QUIZ -->
        <div id="quiz" class="section">
            <div class="card">
                <h2><span class="badge post">POST</span> /api/v1/quiz/generate</h2>
                <label>Fichier PDF ou TXT</label>
                <input type="file" id="quiz-file" accept=".pdf,.txt,.md">
                <div class="row">
                    <div>
                        <label>Nb questions</label>
                        <input type="number" id="quiz-nb" value="5" min="5" max="20">
                    </div>
                    <div>
                        <label>Difficulté</label>
                        <select id="quiz-difficulty">
                            <option value="easy">Facile</option>
                            <option value="medium" selected>Moyen</option>
                            <option value="hard">Difficile</option>
                        </select>
                    </div>
                    <div>
                        <label>Matière</label>
                        <input type="text" id="quiz-matiere" placeholder="ex: Info">
                    </div>
                </div>
                <button onclick="testQuiz()">Générer le quiz <span id="quiz-loader" class="loader">⏳</span></button>
                <div id="quiz-result" class="result" style="display:none;"></div>
                <div id="quiz-interactive" style="display:none; margin-top:15px;"></div>
            </div>
        </div>

        <!-- CORRECTION -->
        <div id="correct" class="section">
            <div class="card">
                <h2><span class="badge post">POST</span> /api/v1/quiz/correct</h2>
                <label>Quiz ID</label>
                <input type="text" id="correct-quiz-id" placeholder="Colle le quiz_id ici">
                <label>Réponses (index séparés par des virgules: 0,2,1,3,...)</label>
                <input type="text" id="correct-answers" placeholder="ex: 0,1,2,0,3">
                <button onclick="testCorrection()">Corriger <span id="correct-loader" class="loader">⏳</span></button>
                <div id="correct-result" class="result" style="display:none;"></div>
            </div>
        </div>

        <!-- IMAGE GENERATION -->
        <div id="image" class="section">
            <div class="card">
                <h2><span class="badge post">POST</span> /api/v1/image/generate</h2>
                <label>Prompt (description de l'image)</label>
                <textarea id="image-prompt" placeholder="Ex: Un chat astronaute sur la lune, style cartoon"></textarea>
                <button onclick="testImage()">🖼️ Générer l'image <span id="image-loader"
                        class="loader">⏳</span></button>
                <div id="image-result" class="result" style="display:none;"></div>
                <div id="image-display" style="display:none; margin-top:15px; text-align:center;"></div>
            </div>
        </div>

        <!-- EXERCISES -->
        <div id="exercises" class="section">
            <div class="card">
                <h2><span class="badge post">POST</span> /api/v1/exercises/generate</h2>
                <label>Fichier PDF ou TXT</label>
                <input type="file" id="exo-file" accept=".pdf,.txt,.md">
                <div class="row">
                    <div>
                        <label>Nb exercices</label>
                        <input type="number" id="exo-nb" value="5" min="3" max="15">
                    </div>
                    <div>
                        <label>Difficulté</label>
                        <select id="exo-difficulty">
                            <option value="easy">Facile</option>
                            <option value="medium">Moyen</option>
                            <option value="hard">Difficile</option>
                            <option value="progressive" selected>Progressif</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label>Matière</label>
                        <input type="text" id="exo-matiere" placeholder="ex: Algorithmique">
                    </div>
                    <div>
                        <label>Chapitre</label>
                        <input type="text" id="exo-chapitre" placeholder="ex: Tri et recherche">
                    </div>
                </div>
                <button onclick="testExercises()">Générer les exercices <span id="exo-loader"
                        class="loader">⏳</span></button>
                <div id="exo-result" class="result" style="display:none;"></div>
                <div id="exo-display" style="display:none; margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';

        // --- TAB NAVIGATION ---
        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // --- HELPERS ---
        function showResult(id, data, isError = false) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            el.className = 'result ' + (isError ? 'error' : 'success');
            el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        }

        function toggleLoader(id, show) {
            document.getElementById(id).classList.toggle('show', show);
        }

        // --- RAG CHAT ---
        async function testChat() {
            const question = document.getElementById('rag-question').value;
            if (!question) return alert('Écris une question');
            toggleLoader('rag-loader', true);
            try {
                const res = await fetch(`${API}/api/v1/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                showResult('rag-result', data, !res.ok);
            } catch (e) {
                showResult('rag-result', 'Erreur: ' + e.message, true);
            }
            toggleLoader('rag-loader', false);
        }

        // --- UPLOAD ---
        async function testUpload() {
            const file = document.getElementById('upload-file').files[0];
            if (!file) return alert('Choisis un fichier');
            toggleLoader('upload-loader', true);
            try {
                const fd = new FormData();
                fd.append('file', file);
                const res = await fetch(`${API}/api/v1/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                showResult('upload-result', data, !res.ok);
            } catch (e) {
                showResult('upload-result', 'Erreur: ' + e.message, true);
            }
            toggleLoader('upload-loader', false);
        }

        // --- SUMMARY ---
        async function testSummary() {
            const file = document.getElementById('summary-file').files[0];
            if (!file) return alert('Choisis un fichier');
            const level = document.getElementById('summary-level').value;
            const style = document.getElementById('summary-style').value;
            const matiere = document.getElementById('summary-matiere').value;
            toggleLoader('summary-loader', true);
            try {
                const fd = new FormData();
                fd.append('file', file);
                let url = `${API}/api/v1/summary/generate?level=${level}&style=${style}`;
                if (matiere) url += `&matiere=${encodeURIComponent(matiere)}`;
                const res = await fetch(url, { method: 'POST', body: fd });
                const data = await res.json();
                showResult('summary-result', data, !res.ok);
            } catch (e) {
                showResult('summary-result', 'Erreur: ' + e.message, true);
            }
            toggleLoader('summary-loader', false);
        }

        // --- QUIZ ---
        let lastQuizId = null;

        async function testQuiz() {
            const file = document.getElementById('quiz-file').files[0];
            if (!file) return alert('Choisis un fichier');
            const nb = document.getElementById('quiz-nb').value;
            const diff = document.getElementById('quiz-difficulty').value;
            const matiere = document.getElementById('quiz-matiere').value;
            toggleLoader('quiz-loader', true);
            try {
                const fd = new FormData();
                fd.append('file', file);
                let url = `${API}/api/v1/quiz/generate?nb_questions=${nb}&difficulty=${diff}`;
                if (matiere) url += `&matiere=${encodeURIComponent(matiere)}`;
                const res = await fetch(url, { method: 'POST', body: fd });
                const data = await res.json();
                showResult('quiz-result', data, !res.ok);

                if (res.ok && data.questions) {
                    lastQuizId = data.quiz_id;
                    renderQuizInteractive(data);
                }
            } catch (e) {
                showResult('quiz-result', 'Erreur: ' + e.message, true);
            }
            toggleLoader('quiz-loader', false);
        }

        function renderQuizInteractive(data) {
            const container = document.getElementById('quiz-interactive');
            container.style.display = 'block';
            let html = `<h2 style="margin-bottom:15px;">📋 ${data.title}</h2>`;
            data.questions.forEach((q, i) => {
                html += `<div style="margin-bottom:15px; padding:12px; background:#0f172a; border-radius:8px;">`;
                html += `<p style="margin-bottom:8px;"><strong>Q${i + 1}.</strong> ${q.question}</p>`;
                q.options.forEach((opt, j) => {
                    html += `<label style="display:block; padding:4px 0; cursor:pointer;">
                        <input type="radio" name="q${i}" value="${j}"> ${opt}
                    </label>`;
                });
                html += `</div>`;
            });
            html += `<button onclick="submitQuiz()">📩 Soumettre mes réponses</button>`;
            html += `<div id="quiz-correction-result" class="result" style="display:none; margin-top:10px;"></div>`;
            container.innerHTML = html;
        }

        async function submitQuiz() {
            if (!lastQuizId) return alert('Aucun quiz généré');
            const answers = [];
            let i = 0;
            while (document.querySelector(`input[name="q${i}"]`)) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                answers.push(selected ? parseInt(selected.value) : -1);
                i++;
            }
            try {
                const res = await fetch(`${API}/api/v1/quiz/correct`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quiz_id: lastQuizId, answers })
                });
                const data = await res.json();
                showResult('quiz-correction-result', data, !res.ok);
            } catch (e) {
                showResult('quiz-correction-result', 'Erreur: ' + e.message, true);
            }
        }

        // --- CORRECTION MANUELLE ---
        async function testCorrection() {
            const quizId = document.getElementById('correct-quiz-id').value;
            const answersStr = document.getElementById('correct-answers').value;
            if (!quizId || !answersStr) return alert('Remplis les champs');
            const answers = answersStr.split(',').map(Number);
            toggleLoader('correct-loader', true);
            try {
                const res = await fetch(`${API}/api/v1/quiz/correct`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quiz_id: quizId, answers })
                });
                const data = await res.json();
                showResult('correct-result', data, !res.ok);
            } catch (e) {
                showResult('correct-result', 'Erreur: ' + e.message, true);
            }
            toggleLoader('correct-loader', false);
        }

        // --- EXERCISES ---
        async function testExercises() {
            const file = document.getElementById('exo-file').files[0];
            if (!file) return alert('Choisis un fichier');
            const nb = document.getElementById('exo-nb').value;
            const diff = document.getElementById('exo-difficulty').value;
            const matiere = document.getElementById('exo-matiere').value;
            const chapitre = document.getElementById('exo-chapitre').value;
            toggleLoader('exo-loader', true);
            try {
                const fd = new FormData();
                fd.append('file', file);
                let url = `${API}/api/v1/exercises/generate?nb_exercises=${nb}&difficulty=${diff}`;
                if (matiere) url += `&matiere=${encodeURIComponent(matiere)}`;
                if (chapitre) url += `&chapitre=${encodeURIComponent(chapitre)}`;
                const res = await fetch(url, { method: 'POST', body: fd });
                const data = await res.json();
                showResult('exo-result', data, !res.ok);

                if (res.ok && data.exercises) {
                    renderExercises(data);
                }
            } catch (e) {
                showResult('exo-result', 'Erreur: ' + e.message, true);
            }
            toggleLoader('exo-loader', false);
        }

        // --- IMAGE GENERATION ---
        async function testImage() {
            const prompt = document.getElementById('image-prompt').value;
            if (!prompt) return alert('Écris une description d\'image');
            toggleLoader('image-loader', true);
            document.getElementById('image-display').style.display = 'none';
            try {
                const res = await fetch(`${API}/api/v1/image/generate?prompt=${encodeURIComponent(prompt)}`, {
                    method: 'POST'
                });
                const data = await res.json();
                showResult('image-result', data, !res.ok);

                if (res.ok && data.image_url) {
                    const container = document.getElementById('image-display');
                    container.style.display = 'block';
                    container.innerHTML = `
                        <p style="margin-bottom:10px; color:#22c55e;">✅ Image générée (${data.format}, ${(data.size_bytes / 1024).toFixed(1)} KB)</p>
                        <img src="${API}${data.image_url}" alt="${data.prompt}" style="max-width:100%; border-radius:12px; border:1px solid #334155;">
                        <br><a href="${API}${data.image_url}" target="_blank" style="color:#38bdf8; margin-top:10px; display:inline-block;">📥 Ouvrir en plein écran</a>
                    `;
                }
            } catch (e) {
                showResult('image-result', 'Erreur: ' + e.message, true);
            }
            toggleLoader('image-loader', false);
        }

        function renderExercises(data) {
            const container = document.getElementById('exo-display');
            container.style.display = 'block';
            let html = `<h2 style="margin-bottom:15px;">📝 ${data.title}</h2>`;
            data.exercises.forEach((ex) => {
                const diffColor = ex.difficulty === 'easy' ? '#22c55e' : ex.difficulty === 'hard' ? '#ef4444' : '#f59e0b';
                html += `<div style="margin-bottom:15px; padding:15px; background:#0f172a; border-radius:8px; border-left:3px solid ${diffColor};">`;
                html += `<p><strong>Exercice ${ex.numero}</strong> <span style="color:${diffColor}; font-size:0.8rem;">(${ex.difficulty})</span></p>`;
                html += `<p style="margin:8px 0;">${ex.enonce}</p>`;
                html += `<details style="margin-top:8px;"><summary style="cursor:pointer; color:#38bdf8;">💡 Indice</summary><p style="padding:8px; color:#94a3b8;">${ex.indice}</p></details>`;
                html += `<details style="margin-top:8px;"><summary style="cursor:pointer; color:#22c55e;">✅ Correction</summary><pre style="padding:8px; color:#94a3b8; white-space:pre-wrap;">${ex.correction}</pre></details>`;
                if (ex.points_cles && ex.points_cles.length) {
                    html += `<details style="margin-top:8px;"><summary style="cursor:pointer; color:#f59e0b;">🎯 Points clés</summary><ul style="padding:8px 20px; color:#94a3b8;">`;
                    ex.points_cles.forEach(p => html += `<li>${p}</li>`);
                    html += `</ul></details>`;
                }
                html += `</div>`;
            });
            if (data.download_url) {
                html += `<a href="${API}${data.download_url}" target="_blank" style="color:#38bdf8;">📥 Télécharger en Markdown</a>`;
            }
            container.innerHTML = html;
        }
    </script>
</body>

</html>
