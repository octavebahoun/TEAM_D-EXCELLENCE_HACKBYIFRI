<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">

  <!-- Text: "Academi" in dark slate and "x" in green -->
  <text x="20" y="130" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="90" letter-spacing="-2">
    <tspan fill="#1e293b">Academi</tspan><tspan fill="#22c55e">x</tspan>
  </text>

  <!-- Graduation cap positioned above the end of the text -->
  <g transform="translate(45, 0)">
    <!-- Cap board (mortarboard flat top) -->
    <polygon points="365,28 415,44 365,60 315,44" fill="#1e293b"/>
    <!-- Cap board top surface -->
    <polygon points="365,30 412,44 365,58 318,44" fill="#334155"/>

    <!-- Cap head (cylindrical base) -->
    <ellipse cx="365" cy="57" rx="24" ry="9" fill="#0f172a"/>
    <rect x="341" y="48" width="48" height="14" rx="2" fill="#0f172a"/>

    <!-- Tassel -->
    <line x1="411" y1="44" x2="411" y2="58" stroke="#22c55e" stroke-width="2.5"/>
    <rect x="406" y="58" width="10" height="7" rx="1.5" fill="#22c55e"/>
    <line x1="407" y1="65" x2="405" y2="74" stroke="#22c55e" stroke-width="1.8"/>
    <line x1="411" y1="65" x2="411" y2="75" stroke="#22c55e" stroke-width="1.8"/>
    <line x1="415" y1="65" x2="417" y2="74" stroke="#22c55e" stroke-width="1.8"/>
  </g>

</svg>